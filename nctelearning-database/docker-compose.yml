name: nctelearning-database

services: 
  nctelearning-database: 
    image: postgres:16
    container_name: nctelearning-database 
    restart: always 
    environment: 
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: nctelearning
    ports: 
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: 
      - nctelearning-network 

  pgadmin: 
    image: dpage/pgadmin4
    container_name: nctelearning-pgadmin
    restart: always 
    environment: 
      PGADMIN_DEFAULT_EMAIL: Ogrpjo@gmail.com
      PGADMIN_DEFAULT_PASSWORD: 123
    ports: 
      - "5050:80"
    depends_on: 
      - nctelearning-database
    networks: 
      - nctelearning-network
    
volumes: 
  postgres_data:

networks: 
  nctelearning-network: 
    name: nctelearning-network
    external: true